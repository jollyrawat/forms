<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parul University - Coordinator Registration</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-overlay">

  <div class="form-container">

    <h5 class="text-center mb-3">
      Cultural Events Coordinator Registration
    </h5>

    <form id="form">

      <!-- Row 1: First Name and Last Name -->
      <div class="row g-2">
        <div class="col-12">
          <input type="text" class="form-control" placeholder="First Name" required>
        </div>
        <div class="col-12">
          <input type="text" class="form-control" placeholder="Last Name" required>
        </div>
      </div>

      <!-- Row 2: DOB and Age -->
      <div class="row g-2">
        <div class="col-12">
          <input type="date" class="form-control" id="dob" required>
        </div>
        <div class="col-12">
          <input type="number" class="form-control" id="age" placeholder="Age" readonly>
        </div>
      </div>

      <!-- Row 3: Username -->
      <div class="row g-2">
        <div class="col-12">
          <input type="text" class="form-control" placeholder="Username" required>
        </div>
      </div>

      <!-- Row 4: Password and Confirm Password -->
      <div class="row g-2">
        <div class="col-12">
          <input type="password" class="form-control" id="password" placeholder="Password" required>
        </div>
        <div class="col-12">
          <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
        </div>
      </div>

      <!-- Row 5: Email and Phone -->
      <div class="row g-2">
        <div class="col-12">
          <input type="email" class="form-control" placeholder="Email" required>
        </div>
        <div class="col-12">
          <div class="input-group">
            <span class="prefix-box">+91</span>
            <input type="tel" class="form-control" placeholder="Phone" required>
          </div>
        </div>
      </div>

      <!-- Row 6: Comment -->
      <div class="row g-2">
        <div class="col-12">
          <textarea class="form-control" rows="2" placeholder="Why should we select you?" required></textarea>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2">Register</button>

    </form>

  </div>

</div>

<script src="java.js"></script>

</body>
</html>
